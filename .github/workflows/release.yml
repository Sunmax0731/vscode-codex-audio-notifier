name: Release Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read package metadata
        id: package
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$package_version" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when version is already released
        if: steps.release_check.outputs.exists == 'true'
        run: echo "Release ${{ steps.package.outputs.tag }} already exists. Skipping."

      - name: Install dependencies
        if: steps.release_check.outputs.exists != 'true'
        run: npm ci

      - name: Build extension
        if: steps.release_check.outputs.exists != 'true'
        run: npm run build

      - name: Package VSIX
        if: steps.release_check.outputs.exists != 'true'
        run: npm run package

      - name: Create GitHub release
        if: steps.release_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          vsix_path="${{ steps.package.outputs.name }}-${{ steps.package.outputs.version }}.vsix"
          gh release create "${{ steps.package.outputs.tag }}" "$vsix_path#VSIX package" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.package.outputs.tag }}" \
            --generate-notes
